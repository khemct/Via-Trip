version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: via-trip-db
    environment:
      POSTGRES_DB: via_trip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: via_trip_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: via-trip-backend
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: via_trip
      DB_USER: postgres
      DB_PASS: via_trip_pw
      GOOGLE_MAPS_SERVER_KEY: ${GOOGLE_MAPS_SERVER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  pgdata:
